environment:
  PATH: /usr/recc/bin:/usr/bin
  RECC_SERVER: unix:/tmp/casd.sock
  RECC_DEPS_GLOBAL_PATHS: true
  RECC_NO_PATH_REWRITE: true
  RECC_INVALID_INPUT_PATHS_REGEX: .*/CMakeFiles/CMakeScratch/.*,.*/Modules/CMakeCCompilerABI.c,.*/Modules/CMakeCXXCompilerABI.cpp,.*/conftest.*

  (?):
  - recc == "passthrough":
      RECC_PASSTHROUGH: true
  - recc == "cache-only":
      RECC_CACHE_ONLY: true
  - recc == "upload-local-build":
      RECC_CACHE_ONLY: true
      RECC_CACHE_UPLOAD_LOCAL_BUILD: true

environment-nocache:
- RECC_CACHE_ONLY
- RECC_PASSTHROUGH
- RECC_CACHE_UPLOAD_LOCAL_BUILD
- RECC_USE_LOCALCAS
- RECC_USE_JOBSERVER

sandbox:
  remote-apis-socket:
    path: /tmp/casd.sock
    (?):
    - recc == "upload-local-build":
        action-cache-enable-update: true
